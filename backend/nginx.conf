# AI小芒 Nginx 反向代理配置（生产可用）
# 使用方法：
#   1. 复制到 /etc/nginx/nginx.conf 或 /etc/nginx/sites-available/ai-video
#   2. 修改 server_name、ssl_certificate、ssl_certificate_key 为真实值
#   3. nginx -t && nginx -s reload
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip（除 SSE 外全局开启）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript;

    # SSE 专用 limit_req_zone（可选，全局限流）
    # limit_req_zone $binary_remote_addr zone=sse_limit:10m rate=30r/m;
    # limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream ai_video_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN_HERE;

        # SSL 配置（请修改为真实证书路径）
        ssl_certificate /path/to/cert.pem;
        ssl_certificate_key /path/to/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # 安全 Header
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # ---- SSE 下行流（核心：关闭所有缓冲）----
        location /sse/ {
            # 可选限流（取消注释启用）
            # limit_req zone=sse_limit burst=10 nodelay;
            # limit_conn conn_limit 5;

            proxy_pass http://ai_video_backend/sse/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 必需：关闭代理缓冲（实时推送）
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;

            # SSE 必需：关闭 gzip（流式响应不应压缩）
            gzip off;

            # SSE 必需 Header
            proxy_set_header Connection '';
            proxy_hide_header X-Accel-Buffering;

            # SSE 长连接超时
            proxy_read_timeout 10m;
            proxy_send_timeout 300s;

            tcp_nodelay on;
            tcp_nopush off;
        }

        # ---- HTTP 上行接口（音频/图像帧上传）----
        location /upload/ {
            client_max_body_size 10m;

            proxy_pass http://ai_video_backend/upload/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP 上传可以开启缓冲（加速大文件）
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_busy_buffers_size 128k;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- 推理触发接口 ----
        location /chat/ {
            proxy_pass http://ai_video_backend/chat/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            gzip off;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;
        }

        # ---- 健康检查 ----
        location /health {
            proxy_pass http://ai_video_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- API 文档（开发用）----
        location /docs {
            proxy_pass http://ai_video_backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

    # ---- HTTP 强制跳转 HTTPS ----
    server {
        listen 80;
        server_name YOUR_DOMAIN_HERE;
        return 301 https://$server_name$request_uri;
    }
}
