name: ai_video
description: AI Visual Conversation Assistant - AI小芒视觉对话助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 硬件权限
  permission_handler: ^12.0.3

  # 音视频采集
  camera: ^0.11.0+2

  # 音频播放（阿里云MP3流式播放）
  audioplayers: ^6.0.0

  # TTS（离线模式本地播报）
  flutter_tts: ^4.0.2

  # 状态管理
  provider: ^6.1.2

  # UI磨砂玻璃
  glassmorphism: ^3.0.0

  # 网络（SSE + HTTP上行分片）
  http: ^1.2.1

  # 网络状态检测
  connectivity_plus: ^6.0.0

  # 图像压缩
  image: ^4.1.0

  # 路径读写（模型文件、缓存）
  path_provider: ^2.1.3

  # 本地持久化（形象 task_id 等配置）
  shared_preferences: ^2.2.3

  # 端侧AI推理（GGUF via llama_cpp_dart）
  llama_cpp_dart: ^0.2.2

  # 3D模型渲染（WebView + model-viewer.js，支持 GLB/GLTF）
  model_viewer_plus: ^1.8.1

  # 音频录制（16KHz PCM）
  record: ^6.2.1

  # 唤醒词检测（Vosk Grammar Mode，本地中文离线 ASR）
  vosk_flutter_service: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/models/
    - assets/vosk-model-small-cn-0.22/
