name: ai_video
description: AI Visual Conversation Assistant - AI小芒视觉对话助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 硬件权限
  permission_handler: ^12.0.0

  # 音视频采集
  camera: ^0.11.0+2

  # 音频播放（PCM 24kHz mono S16LE 流式）
  # 历史：just_audio 在 iOS 上 BytesSource 频繁切换临时文件触发 AVPlayer 状态机错乱
  #       （错误码 -11828 "Cannot Open"），导致一截一截卡顿。audioplayers 同样不行。
  # 切到 flutter_soloud（SoLoud C++ 引擎 + AVAudioEngine 之上）：
  #   - setBufferStream() 建立原生 PCM ring buffer，每 chunk 直接 addAudioDataStream
  #   - AVAudioPlayerNode 真正 gapless，无 prepare 间隙
  #   - 单 turn 1 个 active audio source，0 transition
  flutter_soloud: ^4.0.9

  # TTS（离线模式本地播报）
  flutter_tts: ^4.0.2

  # 状态管理
  provider: ^6.1.2

  # UI磨砂玻璃
  glassmorphism: ^3.0.0

  # 网络（SSE + HTTP上行分片）
  http: ^1.2.1

  # 网络状态检测
  connectivity_plus: ^6.0.0

  # 图像压缩
  image: ^4.1.0

  # 路径读写（模型文件、缓存）
  path_provider: ^2.1.3

  # 端侧AI推理（GGUF via llama_cpp_dart）
  llama_cpp_dart: ^0.2.2

  # 3D模型渲染（WebView + model-viewer.js，支持 GLB/GLTF）
  model_viewer_plus: ^1.8.1

  # 音频录制（16KHz PCM）
  record: ^6.2.1

  # 离线语音识别（Vosk 中文 ASR）
  # 选用 vosk_flutter_service（社区维护的 vosk_flutter 活跃分支），
  # 原因：上游 vosk_flutter 0.3.x 在 iOS 平台直接抛 UnsupportedError，
  #       本项目主要目标平台为 iOS，必须使用支持 iOS 的版本。
  vosk_flutter_service: ^0.1.1

  # 用户设置持久化（设置页 + 当前选中的市场模型 ID）
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # 仅打包小型资产：3D 球体模型 + 模型说明文档
    # 大模型（Vosk 中文、Qwen2-VL GGUF、mmproj）由 OfflineAIEngine 在首次启动时
    # 运行时下载到应用文档目录，不进入 app bundle（避免 TestFlight / App Store 体积限制）
    - assets/ball.obj
    - assets/ball.mtl
    - assets/README.md
